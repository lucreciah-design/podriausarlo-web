<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>podriausarlo — ropa usada, vintage, excelente estado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://www.gstatic.com">
<link rel="preconnect" href="https://firestore.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Work+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <button id="btnAdminIcono" class="icono-admin" aria-label="Panel de administración" title="Panel de administración">&#9881;</button>
  <img id="logoImg" class="logo-img" src="" alt="" style="display:none;">
  <h1 class="brand" id="txtNombre">podriausarlo</h1>
  <p class="tagline" id="txtTagline">ropa usada, vintage, excelente estado</p>
  <p class="location" id="txtCiudad">La Plata, Buenos Aires</p>
</header>

<div id="vidriera">
  <main>
    <div class="grid" id="grid"></div>
    <p class="vacio" id="vacio" style="display:none;">Todavía no hay prendas cargadas.</p>
  </main>
</div>

<!-- Lightbox de fotos ampliadas -->
<div id="lightbox" class="overlay" style="display:none;">
  <div class="lightbox-box" id="lightboxBox">
    <button class="cerrar" id="btnCerrarLightbox">&#10005;</button>
    <button class="zoom-btn" id="btnZoom" title="Ampliar / achicar">&#128269;</button>
    <button class="flecha izq" id="btnFlechaIzq">&#8249;</button>
    <img id="lightboxImg" src="" alt="">
    <button class="flecha der" id="btnFlechaDer">&#8250;</button>
    <div class="dots" id="lightboxDots"></div>
  </div>
</div>

<!-- Login del panel -->
<div id="loginModal" class="overlay" style="display:none;">
  <div class="login-box">
    <button class="cerrar" id="btnCerrarLogin">&#10005;</button>
    <h2>Panel de administración</h2>
    <div class="campo">
      <label for="loginEmail">Mail</label>
      <input type="email" id="loginEmail">
    </div>
    <div class="campo">
      <label for="loginPass">Contraseña</label>
      <input type="password" id="loginPass">
    </div>
    <button class="btn-accion btn-guardar" id="btnIngresar">Ingresar</button>
    <button class="btn-olvide" id="btnOlvide">¿Olvidaste tu contraseña?</button>
    <p id="loginAviso" class="aviso" style="display:none;"></p>
  </div>
</div>

<!-- Panel de administración (solo visible logueada) -->
<div id="admin" style="display:none;">
  <div class="modo-toggle modo-toggle-doble">
    <button id="btnVerVidriera">Ver vidriera (seguís logueada)</button>
    <button id="btnCerrarSesion">Cerrar sesión</button>
  </div>

  <div class="panel">
    <h2>Configuración del sitio</h2>

    <div class="campo">
      <label for="cfg_nombre">Nombre de la marca</label>
      <input type="text" id="cfg_nombre" placeholder="podriausarlo">
    </div>
    <div class="campo">
      <label for="cfg_tagline">Bajada / tagline</label>
      <input type="text" id="cfg_tagline" placeholder="ropa usada, vintage, excelente estado">
    </div>
    <div class="campo">
      <label for="cfg_ciudad">Ciudad</label>
      <input type="text" id="cfg_ciudad" placeholder="La Plata, Buenos Aires">
    </div>
    <div class="campo">
      <label for="cfg_paleta">Paleta de colores</label>
      <select id="cfg_paleta">
        <option value="calida">Cálida (fondo tan) — la actual</option>
        <option value="durazno">Suave durazno (fondo flesh)</option>
        <option value="palida">Pálida oliva (fondo crema)</option>
      </select>
    </div>

    <div class="fila-doble">
      <div class="campo">
        <label for="cfg_tamano_titulo">Tamaño del título</label>
        <select id="cfg_tamano_titulo">
          <option value="chico">Chico</option>
          <option value="mediano">Mediano (actual)</option>
          <option value="grande">Grande</option>
        </select>
      </div>
      <div class="campo">
        <label for="cfg_color_titulo">Color del título</label>
        <select id="cfg_color_titulo">
          <option value="carbon">Carbón (actual)</option>
          <option value="oliva">Oliva</option>
          <option value="camel">Camel</option>
          <option value="terracota">Terracota</option>
          <option value="ebony">Ebony</option>
          <option value="brownsugar">Brown sugar</option>
        </select>
      </div>
    </div>

    <div class="campo">
      <label for="cfg_fondo">Fondo decorativo (aplica a toda la web)</label>
      <select id="cfg_fondo">
        <option value="liso">Liso, sin diseño</option>
        <option value="hojas">Hojas</option>
        <option value="enredadera1">Enredadera — tipo 1</option>
        <option value="enredadera2">Enredadera — tipo 2</option>
      </select>
    </div>

    <div class="campo">
      <label for="cfg_logo">Logo (opcional, reemplaza el nombre de texto)</label>
      <input type="file" id="cfg_logo" accept="image/*">
      <button class="btn-accion btn-secundario" id="btnQuitarLogo" style="margin-top:8px;">Quitar logo y volver al texto</button>
    </div>

    <button class="btn-accion btn-guardar" id="btnGuardarConfig">Guardar configuración</button>
    <div class="aviso" id="avisoConfig" style="display:none;"></div>
  </div>

  <div class="panel">
    <h2 id="tituloFormPrenda">Cargar prenda nueva</h2>

    <div class="campo">
      <label for="f_nombre">Nombre corto</label>
      <input type="text" id="f_nombre" placeholder="Tapado vintage 80/90">
    </div>

    <div class="fila-doble">
      <div class="campo">
        <label for="f_precio">Precio</label>
        <input type="number" id="f_precio" placeholder="45000">
      </div>
      <div class="campo">
        <label for="f_talle">Talle</label>
        <input type="text" id="f_talle" placeholder="M">
      </div>
    </div>

    <div class="campo">
      <label for="f_descripcion">Descripción</label>
      <textarea id="f_descripcion" placeholder="Excelente estado, lana gruesa, corte oversize."></textarea>
    </div>

    <div class="campo">
      <label for="f_observaciones">Observaciones (ej. formas de pago, envío)</label>
      <textarea id="f_observaciones" placeholder="Efectivo / Transferencia, envío gratis"></textarea>
    </div>

    <div class="campo">
      <label for="f_reel">Link al reel de Instagram</label>
      <input type="url" id="f_reel" placeholder="https://instagram.com/reel/...">
    </div>

    <div class="campo" id="fotosExistentesCont" style="display:none;">
      <label>Fotos actuales (podés reordenarlas o sacarlas)</label>
      <div id="fotosExistentes" class="fotos-existentes"></div>
    </div>

    <div class="campo">
      <label for="f_foto" id="labelFotos">Fotos (hasta 4)</label>
      <input type="file" id="f_foto" accept="image/*" multiple>
    </div>

    <button class="btn-accion btn-guardar" id="btnGuardarPrenda">Guardar prenda</button>
    <button class="btn-accion btn-secundario" id="btnCancelarEdicion" style="display:none; margin-top:8px; width:100%;">Cancelar edición</button>
    <div class="aviso" id="avisoGuardado" style="display:none;"></div>
  </div>

  <div class="panel">
    <h2>Tu catálogo</h2>
    <div id="listaAdmin"></div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
